# PR + main gate: the full local loop (test → typecheck → build) plus the two
# publish-shaped checks — a pack dry-run so a broken files/bin manifest fails
# here instead of on release day, and a --help smoke of the built binary.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install --frozen-lockfile

      - name: Test
        run: bun test

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Built binary smoke (--help)
        run: node dist/index.js --help

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish dry-run (validates the pack, no token needed)
        run: npm publish --dry-run --access public
